<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/game.png">
    <title>Simon Says Game</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-header">
        <h1>Simon Says</h1>
        <h2>Press any key to start</h2>
    </div>
    
    <div class="controls">
        <button id="playBtn">Play Game</button>
    </div>
    
    <div class="btn-container">
        <div class="line-one">
            <div class="btn red" id="red" type="button"></div>
            <div class="btn yellow" id="yellow" type="button"></div>
        </div>
        <div class="line-two">
            <div class="btn green" id="green" type="button"></div>
            <div class="btn purple" id="purple" type="button"></div>
        </div>
    </div>
    
    <footer class="game-footer">
        <p>Created by Dharm Singh Saini</p>
        <div class="footer-links">
            <a href="https://dharm-portfolio.vercel.app/" target="_blank" rel="noopener noreferrer">Portfolio</a>
            <a href="https://www.linkedin.com/in/dharm-singh-saini/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a href="mailto:opdsbanasya@gmail.com">Contact</a>
        </div>
    </footer>
    
    <script src="app.js"></script>
</body>
</html>
